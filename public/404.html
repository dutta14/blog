<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: encode the path into a query string
      // so index.html can pick it up and restore it via history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/blog/?p=' + encodeURIComponent(l.pathname.slice('/blog'.length) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
</html>
